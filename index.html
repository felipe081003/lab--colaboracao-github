<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nova Funcionalidade</title>
</head>
<body>
  <h1>Bem-vindo ao projeto de colaboração!</h1>
  <button onclick="mostrarMensagem()">Clique aqui</button>
  <p id="mensagem"></p>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").innerText = "Nova funcionalidade ativada com sucesso!";
    }
  </script>
</body>
</html>
